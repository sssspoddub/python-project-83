<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Анализатор страниц</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-OB0YV4Xfs1fZkM3Z3F+0GxVQfV+Q2YmOxPVQQZ3OQvFZ8PI3oPRgdYjog8T7dK2R"
    crossorigin="anonymous"
  >
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">Page Analyzer</a>
    </div>
  </nav>

  <main class="container mt-5">
    <h1 class="mb-4 text-center">Анализатор страниц</h1>

    <form action="{{ url_for('index') }}" method="get" class="row justify-content-center">
      <div class="col-md-8">
        <div class="input-group mb-3">
          <input
            type="url"
            name="url"
            class="form-control"
            placeholder="Введите URL для анализа"
            aria-label="URL для анализа"
            required
          >
          <button class="btn btn-primary" type="submit">ПРОВЕРИТЬ</button>
        </div>
      </div>
    </form>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoN0u+8Gk5JpW1n8dLAZ4lE6l5eEegIK8F8rW1G0QrjIYV+"
    crossorigin="anonymous"
  ></script>
</body>
</html>
